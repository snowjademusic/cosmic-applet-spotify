id: com.example.CosmicAppletSpotify
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-applet-spotify
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    - RUSTUP_HOME: /run/build/cosmic-applet-spotify/.rustup
    - CARGO_HOME: /run/build/cosmic-applet-spotify/cargo-home
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.mpris.MediaPlayer2.spotify
  - --filesystem=xdg-config/com.example.CosmicAppletSpotify:create
modules:
  - name: cosmic-applet-spotify
    buildsystem: simple
    build-commands:
      # 1. Find where the heck the sources actually are and link them
      - |
        ln -s $(find . -type d -name "vendor" | head -n 1) vendor
        
        ln -s $(find . -type d -name "libcosmic-a44cff8" | head -n 1) libcosmic-src
        
        mkdir -p .cargo
        cat <<EOF > .cargo/config.toml
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "vendor"

        [patch."https://github.com/pop-os/libcosmic"]
        libcosmic = { path = "libcosmic-src" }
        EOF
      
      # 2. Build offline
      - cargo build --offline --release
      
      # 3. Install
      - install -D target/release/cosmic-applet-spotify /app/bin/cosmic-applet-spotify
      - install -D com.example.CosmicAppletSpotify.desktop /app/share/applications/com.example.CosmicAppletSpotify.desktop
      - install -D spotify-applet.svg /app/share/icons/hicolor/scalable/apps/spotify-applet.svg
    sources:
      - type: dir
        path: .
      - generated-sources.json