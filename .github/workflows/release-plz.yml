name: Release-plz

on:
  push:
    branches:
      - master

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'snowjademusic' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate Cargo source config for CI
        run: |
          if [[ -f .cargo/config.toml ]] && grep -Eq 'replace-with|vendored-sources|directory\s*=\s*"vendor"|source\.crates-io' .cargo/config.toml; then
            echo "Repository .cargo/config.toml configures vendored source replacement."
            echo "release-plz uses temporary worktrees where ./vendor is not present, so this breaks cargo package."
            echo "Keep repository .cargo/config.toml CI-safe (empty/default) and put local vendor config in user-level CARGO_HOME config instead."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Force clean Cargo home for this job
        run: |
          CLEAN_CARGO_HOME="${RUNNER_TEMP}/cargo-home"
          mkdir -p "${CLEAN_CARGO_HOME}"
          cat > "${CLEAN_CARGO_HOME}/config.toml" <<'EOF'
          [net]
          git-fetch-with-cli = true
          EOF
          echo "CARGO_HOME=${CLEAN_CARGO_HOME}" >> "${GITHUB_ENV}"

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    needs: release-plz-pr
    if: ${{ github.repository_owner == 'snowjademusic' }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate Cargo source config for CI
        run: |
          if [[ -f .cargo/config.toml ]] && grep -Eq 'replace-with|vendored-sources|directory\s*=\s*"vendor"|source\.crates-io' .cargo/config.toml; then
            echo "Repository .cargo/config.toml configures vendored source replacement."
            echo "release-plz uses temporary worktrees where ./vendor is not present, so this breaks cargo package."
            echo "Keep repository .cargo/config.toml CI-safe (empty/default) and put local vendor config in user-level CARGO_HOME config instead."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Force clean Cargo home for this job
        run: |
          CLEAN_CARGO_HOME="${RUNNER_TEMP}/cargo-home"
          mkdir -p "${CLEAN_CARGO_HOME}"
          cat > "${CLEAN_CARGO_HOME}/config.toml" <<'EOF'
          [net]
          git-fetch-with-cli = true
          EOF
          echo "CARGO_HOME=${CLEAN_CARGO_HOME}" >> "${GITHUB_ENV}"

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
