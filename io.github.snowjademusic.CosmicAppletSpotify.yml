id: io.github.snowjademusic.CosmicAppletSpotify
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-applet-spotify
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    - RUSTUP_HOME: /run/build/cosmic-applet-spotify/.rustup
    - CARGO_HOME: /run/build/cosmic-applet-spotify/cargo-home
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.mpris.MediaPlayer2.spotify
  - --filesystem=xdg-config/io.github.snowjademusic.CosmicAppletSpotify:create
  - --filesystem=xdg-config/cosmic:ro
  - --filesystem=xdg-data/cosmic:ro
  - --filesystem=xdg-data/icons:ro
  - --filesystem=xdg-data/fonts:ro
modules:
  - name: cosmic-applet-spotify
    buildsystem: simple
    build-commands:
      # Build using only vendored crates
      - cargo build --offline --release

      # Install the files to the Flatpak /app directory
      - install -D target/release/cosmic-applet-spotify /app/bin/cosmic-applet-spotify
      - install -D data/io.github.snowjademusic.CosmicAppletSpotify.desktop /app/share/applications/io.github.snowjademusic.CosmicAppletSpotify.desktop
      - install -D data/icons/hicolor/scalable/apps/io.github.snowjademusic.CosmicAppletSpotify.svg /app/share/icons/hicolor/scalable/apps/io.github.snowjademusic.CosmicAppletSpotify.svg
      - install -D data/io.github.snowjademusic.CosmicAppletSpotify.metainfo.xml /app/share/metainfo/io.github.snowjademusic.CosmicAppletSpotify.metainfo.xml
    sources:
      - type: dir
        path: .